<button
  type="button"
  class="theme-switcher__button"
  [attr.aria-label]="themeService.themeActionLabel()"
  [attr.title]="themeService.themeActionLabel()"
  (click)="themeService.toggleTheme()"
>
  @if (themeService.currentTheme() === 'dark') {
    <svg
      class="theme-switcher__icon"
      viewBox="0 0 24 24"
      width="18"
      height="18"
      fill="none"
      stroke="currentColor"
      stroke-width="1.9"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2.75v2.5"></path>
      <path d="M12 18.75v2.5"></path>
      <path d="m4.93 4.93 1.77 1.77"></path>
      <path d="m17.3 17.3 1.77 1.77"></path>
      <path d="M2.75 12h2.5"></path>
      <path d="M18.75 12h2.5"></path>
      <path d="m4.93 19.07 1.77-1.77"></path>
      <path d="m17.3 6.7 1.77-1.77"></path>
    </svg>
  } @else {
    <svg
      class="theme-switcher__icon"
      viewBox="0 0 24 24"
      width="18"
      height="18"
      fill="none"
      stroke="currentColor"
      stroke-width="1.9"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <path d="M20 15.2A7.9 7.9 0 0 1 8.8 4 8.7 8.7 0 1 0 20 15.2Z"></path>
    </svg>
  }
</button>
