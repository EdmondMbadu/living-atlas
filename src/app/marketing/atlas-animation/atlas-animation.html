<div class="relative w-full h-full flex items-center justify-center overflow-hidden bg-[var(--surface-strong)] rounded-[2rem]">
  <!-- Background Glow -->
  <div class="absolute inset-0 bg-radial-[var(--accent)]/5 blur-3xl"></div>
  
  <svg viewBox="0 0 800 600" class="w-full h-full preserve-3d animate-breathing">
    <!-- Define Filters and Gradients -->
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="8" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
      
      <linearGradient id="branchGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:var(--accent);stop-opacity:0.2" />
        <stop offset="50%" style="stop-color:var(--accent);stop-opacity:0.9" />
        <stop offset="100%" style="stop-color:var(--accent-soft);stop-opacity:1" />
      </linearGradient>

      <radialGradient id="nodeGradient">
        <stop offset="0%" style="stop-color:white;stop-opacity:1" />
        <stop offset="100%" style="stop-color:var(--accent);stop-opacity:0.5" />
      </radialGradient>
      
      <radialGradient id="particleGradient">
        <stop offset="0%" style="stop-color:var(--accent-soft);stop-opacity:0.8" />
        <stop offset="100%" style="stop-color:var(--accent);stop-opacity:0" />
      </radialGradient>
    </defs>

    <!-- Floating Particles Layer -->
    <g class="particles-layer">
      @for (p of particles; track p.id) {
        <circle [attr.cx]="p.x" [attr.cy]="p.y" [attr.r]="p.size" 
                fill="url(#particleGradient)" class="particle" 
                [style.animation-duration]="p.duration + 's'"
                [style.animation-delay]="p.delay + 's'" />
      }
    </g>

    <!-- The "Living" Network -->
    <g class="network-group" filter="url(#glow)">
      <!-- Branches -->
      @for (path of branches; track path) {
        <path [attr.d]="path" 
              fill="none" 
              stroke="url(#branchGradient)" 
              stroke-width="2.5" 
              stroke-linecap="round"
              class="branch-path" />
      }

      <!-- Nodes -->
      @for (node of nodes; track node.id) {
        <g class="node-pulse" [style.animation-delay]="node.delay + 'ms'">
          <circle [attr.cx]="node.x" [attr.cy]="node.y" [attr.r]="node.size" fill="url(#nodeGradient)" />
          <circle [attr.cx]="node.x" [attr.cy]="node.y" [attr.r]="node.size * 2.5" 
                  fill="var(--accent)" fill-opacity="0.15" class="node-outer-glow" />
        </g>
      }
    </g>

    <!-- Central Compass/Core (Bigger) -->
    <g transform="translate(400, 300)" class="central-core">
      <circle r="90" fill="var(--bg)" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6 6" class="core-ring" />
      <circle r="100" fill="none" stroke="var(--accent)" stroke-width="0.5" stroke-dasharray="1 10" class="core-ring-outer" />
      <image href="/assets/living-atlas-logo.png" x="-60" y="-60" width="120" height="120" class="core-logo" />
    </g>
  </svg>

  <style>
    .animate-breathing {
      animation: breathing 12s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes breathing {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .branch-path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawBranch 5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    }

    @keyframes drawBranch {
      0% { stroke-dashoffset: 1000; opacity: 0; }
      30% { opacity: 0.1; }
      100% { stroke-dashoffset: 0; opacity: 0.9; }
    }

    .node-pulse {
      animation: pulseNode 4s ease-in-out infinite;
    }

    @keyframes pulseNode {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .node-outer-glow {
      animation: ripple 5s ease-out infinite;
    }

    @keyframes ripple {
      0% { r: 5; opacity: 0.9; }
      100% { r: 40; opacity: 0; }
    }

    .particle {
      animation: drift linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0) translateX(0); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      to { transform: translateY(-100px) translateX(20px); opacity: 0; }
    }

    .central-core {
      animation: floatCore 8s ease-in-out infinite;
    }

    @keyframes floatCore {
      0%, 100% { transform: translate(400px, 300px) rotate(0deg); }
      50% { transform: translate(400px, 285px) rotate(2deg); }
    }

    .core-ring {
      animation: spin 30s linear infinite;
      transform-origin: center;
    }

    .core-ring-outer {
      animation: spin 45s linear infinite reverse;
      transform-origin: center;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</div>
