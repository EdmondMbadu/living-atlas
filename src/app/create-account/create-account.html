<div class="min-h-screen bg-[var(--bg)] text-[var(--text)] selection:bg-[var(--accent)] selection:text-[var(--accent-contrast)]">
  <div class="mx-auto flex min-h-screen max-w-4xl flex-col px-6 py-6 lg:px-10">
    <header class="theme-nav flex items-center justify-between rounded-full border px-5 py-4">
      <a routerLink="/" class="flex items-center gap-3 text-xl font-bold tracking-tighter text-[var(--text)]">
        <div class="flex h-10 w-10 items-center justify-center rounded-2xl border border-white/10 bg-white/5 p-1.5 shadow-[0_0_24px_rgba(59,175,98,0.08)]">
          <img src="/assets/living-atlas-logo.png" alt="Living Atlas logo" class="h-full w-full object-contain" />
        </div>
        <span>Living Atlas</span>
      </a>
      <div class="flex items-center gap-3">
        <app-theme-toggle></app-theme-toggle>
        <a routerLink="/sign-in" class="ghost-btn !px-4 !py-2.5 text-sm">Sign In</a>
      </div>
    </header>

    <main class="flex flex-1 items-center justify-center py-10">
      <section class="glass-card w-full max-w-xl rounded-[2.5rem] p-8 shadow-[var(--shadow-elevated)] lg:p-10">
        <div class="mb-8">
          <p class="text-sm font-bold uppercase tracking-[0.3em] text-[var(--accent)]">Get Started</p>
          <h2 class="mt-3 text-4xl font-bold text-[var(--text)]">Create your account</h2>
          <p class="mt-3 text-[var(--muted)]">
            Start with your name, email, and password, or continue with Google.
          </p>
        </div>

        <button type="button" class="social-btn">
          <svg aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5">
            <path fill="#EA4335" d="M12 10.2v3.9h5.4c-.2 1.3-1.5 3.8-5.4 3.8-3.2 0-5.9-2.7-5.9-6s2.7-6 5.9-6c1.8 0 3.1.8 3.8 1.5l2.6-2.5C16.7 3.4 14.6 2.5 12 2.5a9.5 9.5 0 1 0 0 19c5.5 0 9.1-3.8 9.1-9.2 0-.6-.1-1.1-.2-1.6H12Z"/>
          </svg>
          Continue with Google
        </button>

        <div class="my-8 flex items-center gap-4">
          <div class="h-px flex-1 bg-[var(--line)]"></div>
          <span class="text-xs font-bold uppercase tracking-[0.25em] text-[var(--muted)]">or use your email</span>
          <div class="h-px flex-1 bg-[var(--line)]"></div>
        </div>

        <form class="space-y-5">
          <div>
            <label class="auth-label" for="create-name">Full name</label>
            <input id="create-name" type="text" class="auth-input" placeholder="Ada Lovelace" />
          </div>

          <div>
            <label class="auth-label" for="create-email">Email</label>
            <input id="create-email" type="email" class="auth-input" placeholder="you@company.com" />
          </div>

          <div>
            <label class="auth-label" for="create-password">Password</label>
            <input id="create-password" type="password" class="auth-input" placeholder="Choose a strong password" />
          </div>

          <label class="flex items-start gap-3 text-sm leading-relaxed text-[var(--muted)]">
            <input type="checkbox" class="auth-check mt-1 h-4 w-4 rounded border-[var(--line)] bg-transparent" />
            I agree to the Terms of Service and Privacy Policy.
          </label>

          <button type="button" class="primary-btn w-full justify-center">Create Account</button>
        </form>

        <p class="mt-8 text-center text-sm text-[var(--muted)]">
          Already have an account?
          <a routerLink="/sign-in" class="font-semibold text-[var(--accent)] hover:opacity-80">Sign in</a>
        </p>
      </section>
    </main>
  </div>
</div>
