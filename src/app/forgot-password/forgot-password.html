<div class="min-h-screen bg-[var(--bg)] text-[var(--text)] selection:bg-[var(--accent)] selection:text-[var(--accent-contrast)]">
  <div class="mx-auto flex min-h-screen max-w-4xl flex-col px-6 py-6 lg:px-10">
    <header class="theme-nav flex items-center justify-between rounded-full border px-5 py-4">
      <a routerLink="/" class="flex items-center gap-2 text-xl font-bold tracking-tighter text-[var(--text)]">
        engram core <span class="h-2 w-2 rounded-full bg-[var(--accent)]"></span>
      </a>
      <div class="flex items-center gap-3">
        <app-theme-toggle></app-theme-toggle>
        <a routerLink="/sign-in" class="ghost-btn !px-4 !py-2.5 text-sm">Back to Sign In</a>
      </div>
    </header>

    <main class="flex flex-1 items-center justify-center py-10">
      <section class="glass-card w-full max-w-xl rounded-[2.5rem] p-8 shadow-[var(--shadow-elevated)] lg:p-10">
        <p class="text-sm font-bold uppercase tracking-[0.3em] text-[var(--accent)]">Forgot Password</p>
        <h1 class="mt-3 text-4xl font-bold text-[var(--text)]">Reset access</h1>
        <p class="mt-4 text-[var(--muted)]">
          UI only for now. When auth is wired up, this screen can send a password reset email.
        </p>

        <form class="mt-8 space-y-5">
          <div>
            <label class="auth-label" for="forgot-email">Email</label>
            <input id="forgot-email" type="email" class="auth-input" placeholder="you@company.com" />
          </div>

          <button type="button" class="primary-btn w-full justify-center">Send Reset Link</button>
        </form>

        <p class="mt-8 text-center text-sm text-[var(--muted)]">
          Remembered it?
          <a routerLink="/sign-in" class="font-semibold text-[var(--accent)] hover:opacity-80">Return to sign in</a>
        </p>
      </section>
    </main>
  </div>
</div>
